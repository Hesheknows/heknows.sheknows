<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña · He Knows · She Knows</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--cream:#F7F3EE;--blush:#E8C4B0;--terra:#C47A5A;--night:#1A1410;--slate:#3D3530;--muted:#9A8880;--gold:#C9A96E;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--night);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:420px;padding:24px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;text-align:center;margin-bottom:48px;}
.logo span{color:var(--terra);font-style:italic;}
.card{background:white;border:1px solid rgba(196,122,90,0.12);border-radius:3px;padding:40px 36px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--night);margin-bottom:6px;text-align:center;}
.card-sub{font-size:0.82rem;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.6;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:7px;}
.field input{width:100%;padding:12px 15px;border:1px solid rgba(61,53,48,0.15);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--night);background:var(--cream);outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--terra);background:white;}
.btn{width:100%;padding:13px;background:var(--night);color:var(--cream);border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:8px;}
.btn:hover{background:var(--terra);}
.btn:disabled{opacity:0.5;cursor:default;}
.msg{font-size:0.78rem;text-align:center;margin-top:12px;min-height:20px;}
.msg.err{color:#8B2A1A;}
.msg.ok{color:var(--terra);}
.back{display:block;text-align:center;margin-top:24px;font-size:0.72rem;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.back:hover{color:var(--terra);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">He Knows · <span>She Knows</span></div>
  <div class="card">
    <div class="card-title">Nueva contraseña</div>
    <div class="card-sub">Elige una contraseña nueva para tu cuenta.</div>
    <div class="field"><label>Nueva contraseña</label><input type="password" id="new-pass" placeholder="Mínimo 6 caracteres"></div>
    <div class="field"><label>Confirmar contraseña</label><input type="password" id="new-pass2" placeholder="Repite tu contraseña" onkeydown="if(event.key==='Enter')doUpdate()"></div>
    <button class="btn" id="btn-update" onclick="doUpdate()">Guardar nueva contraseña →</button>
    <div class="msg" id="msg"></div>
    <a href="/login.html" class="back">← Volver al login</a>
  </div>
</div>

<script src="supabase.js"></script>
<script>
// Supabase redirige con el token en el hash — lo procesamos
(async () => {
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    if (access_token) {
      await HKSK.db.auth.setSession({ access_token, refresh_token });
    }
  }
})();

async function doUpdate() {
  const pass = document.getElementById('new-pass').value;
  const pass2 = document.getElementById('new-pass2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn-update');
  msg.textContent = '';
  msg.className = 'msg';

  if (!pass) { msg.className='msg err'; msg.textContent='Por favor ingresa una contraseña.'; return; }
  if (pass.length < 6) { msg.className='msg err'; msg.textContent='La contraseña debe tener al menos 6 caracteres.'; return; }
  if (pass !== pass2) { msg.className='msg err'; msg.textContent='Las contraseñas no coinciden.'; return; }

  btn.disabled = true; btn.textContent = 'Guardando…';

  const { error } = await HKSK.db.auth.updateUser({ password: pass });
  if (error) {
    msg.className = 'msg err';
    msg.textContent = 'Error al actualizar. Intenta de nuevo o solicita un nuevo enlace.';
    btn.disabled = false; btn.textContent = 'Guardar nueva contraseña →';
  } else {
    msg.className = 'msg ok';
    msg.textContent = '✓ Contraseña actualizada. Redirigiendo…';
    setTimeout(() => window.location.href = '/dashboard.html', 2000);
  }
}
</script>
</body>
</html>
