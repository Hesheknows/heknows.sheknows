<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · He Knows · She Knows</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--cream:#F7F3EE;--blush:#E8C4B0;--terra:#C47A5A;--night:#1A1410;--slate:#3D3530;--muted:#9A8880;--gold:#C9A96E;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--night);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:420px;padding:24px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;text-align:center;margin-bottom:48px;}
.logo a{color:var(--night);text-decoration:none;}
.logo span{color:var(--terra);font-style:italic;}
.card{background:white;border:1px solid rgba(196,122,90,0.12);border-radius:3px;padding:40px 36px;}
.tabs{display:flex;border-bottom:1px solid rgba(196,122,90,0.15);margin-bottom:32px;}
.tab{flex:1;padding:10px;text-align:center;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
.tab.on{color:var(--terra);border-bottom-color:var(--terra);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:7px;}
.field input{width:100%;padding:12px 15px;border:1px solid rgba(61,53,48,0.15);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--night);background:var(--cream);outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--terra);background:white;}
.pass-wrap{position:relative;}
.pass-wrap input{padding-right:42px;}
.pass-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:color 0.2s;border-radius:2px;}
.pass-toggle:hover{color:var(--terra);}
.pass-toggle svg{display:block;width:18px;height:18px;}
.btn{width:100%;padding:13px;background:var(--night);color:var(--cream);border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:8px;}
.btn:hover{background:var(--terra);}
.btn:disabled{opacity:0.5;cursor:default;}
.err{font-size:0.78rem;color:#8B2A1A;text-align:center;margin-top:12px;min-height:20px;}
.back{display:block;text-align:center;margin-top:24px;font-size:0.72rem;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.back:hover{color:var(--terra);}

@media(max-width:600px){
  body{padding:12px;align-items:flex-start;padding-top:40px;}
  .wrap{padding:8px;}
  .logo{font-size:0.95rem;margin-bottom:32px;}
  .card{padding:28px 22px;}
  .tab{font-size:0.65rem;padding:8px;letter-spacing:0.1em;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><a href="/">He Knows · <span>She Knows</span></a></div>
  <div class="card">
    <div class="tabs" id="main-tabs">
      <div class="tab on" onclick="showTab('login')">Iniciar sesión</div>
      <div class="tab" onclick="showTab('register')">Registrarse</div>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="field"><label>Correo electrónico</label><input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email"></div>
      <div class="field">
        <label>Contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="login-pass" placeholder="Tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
          <button type="button" class="pass-toggle" id="pass-toggle-btn" onclick="togglePassword()" aria-label="Mostrar contraseña">
            <svg id="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path d="M2 12s3.5-7 10-7c2 0 3.7.6 5.2 1.5"/>
              <path d="M22 12s-3.5 7-10 7c-2 0-3.7-.6-5.2-1.5"/>
              <path d="M9.5 9.5a3 3 0 0 0 4.2 4.2"/>
              <line x1="3" y1="3" x2="21" y2="21"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn" id="btn-login" onclick="doLogin()">Entrar →</button>
      <div class="err" id="login-err"></div>
      <div style="text-align:center;margin-top:14px;">
        <a href="#" onclick="showTab('reset');return false;" style="font-size:0.72rem;color:var(--muted);text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='var(--terra)'" onmouseout="this.style.color='var(--muted)'">¿Olvidaste tu contraseña?</a>
      </div>
    </div>

    <!-- REGISTRO -->
    <div id="tab-register" style="display:none;">
      <div class="field"><label>Correo electrónico</label><input type="email" id="reg-email" placeholder="tu@correo.com" autocomplete="email"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
      <div class="field"><label>Confirmar contraseña</label><input type="password" id="reg-pass2" placeholder="Repite tu contraseña" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="btn" id="btn-reg" onclick="doRegister()">Crear cuenta →</button>
      <div class="err" id="reg-err"></div>
    </div>

    <!-- RESET PASSWORD -->
    <div id="tab-reset" style="display:none;">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;color:var(--night);margin-bottom:6px;">Recuperar contraseña</div>
        <div style="font-size:0.8rem;color:var(--muted);line-height:1.6;">Te enviaremos un enlace para crear una nueva contraseña.</div>
      </div>
      <div class="field"><label>Correo electrónico</label><input type="email" id="reset-email" placeholder="tu@correo.com" autocomplete="email" onkeydown="if(event.key==='Enter')doReset()"></div>
      <button class="btn" id="btn-reset" onclick="doReset()">Enviar enlace →</button>
      <div class="err" id="reset-err"></div>
      <div style="text-align:center;margin-top:14px;">
        <a href="#" onclick="showTab('login');return false;" style="font-size:0.72rem;color:var(--muted);text-decoration:none;" onmouseover="this.style.color='var(--terra)'" onmouseout="this.style.color='var(--muted)'">← Volver al login</a>
      </div>
    </div>

    <a href="/" class="back">← Volver al inicio</a>
  </div>
</div>

<script src="supabase.js"></script>
<script>
if (window.location.hash.includes("access_token")) {
  window.location.href = "/onboarding.html";
}

(async () => {
  const session = await HKSK.getSession();
  if (session) {
    localStorage.setItem('hksk-session', JSON.stringify({
      access_token: session.access_token,
      refresh_token: session.refresh_token,
      user: { id: session.user.id, email: session.user.email }
    }));
    window.location.href = '/dashboard.html';
  }
})();

function showTab(tab) {
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-reset').style.display = tab === 'reset' ? 'block' : 'none';
  document.getElementById('main-tabs').style.display = tab === 'reset' ? 'none' : 'flex';
  if (tab !== 'reset') document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', (i === 0) === (tab === 'login')));
}

function togglePassword() {
  const input = document.getElementById('login-pass');
  const eyeShow = document.getElementById('eye-show');
  const eyeHide = document.getElementById('eye-hide');
  const btn = document.getElementById('pass-toggle-btn');
  if (input.type === 'password') {
    input.type = 'text';
    eyeShow.style.display = 'none';
    eyeHide.style.display = 'block';
    btn.setAttribute('aria-label', 'Ocultar contraseña');
  } else {
    input.type = 'password';
    eyeShow.style.display = 'block';
    eyeHide.style.display = 'none';
    btn.setAttribute('aria-label', 'Mostrar contraseña');
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  const btn = document.getElementById('btn-login');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Por favor llena todos los campos.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  const { data, error } = await HKSK.signIn(email, pass);
  if (error) {
    errEl.textContent = 'Correo o contraseña incorrectos.';
    btn.disabled = false; btn.textContent = 'Entrar →';
  } else {
    if (data?.session) {
      localStorage.setItem('hksk-session', JSON.stringify({
        access_token: data.session.access_token,
        refresh_token: data.session.refresh_token,
        user: { id: data.session.user.id, email: data.session.user.email }
      }));
    }
    window.location.href = '/dashboard.html';
  }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  const errEl = document.getElementById('reg-err');
  const btn = document.getElementById('btn-reg');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Por favor llena todos los campos.'; return; }
  if (pass !== pass2) { errEl.textContent = 'Las contraseñas no coinciden.'; return; }
  if (pass.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.'; return; }
  btn.disabled = true; btn.textContent = 'Creando cuenta…';
  const { data, error } = await HKSK.signUp(email, pass);
  if (error) {
    errEl.textContent = error.message.includes('already') ? 'Este correo ya está registrado.' : 'Error al crear cuenta. Intenta de nuevo.';
    btn.disabled = false; btn.textContent = 'Crear cuenta →';
  } else {
    if (data?.session) {
      localStorage.setItem('hksk-session', JSON.stringify({
        access_token: data.session.access_token,
        refresh_token: data.session.refresh_token,
        user: { id: data.session.user.id, email: data.session.user.email }
      }));
      window.location.href = '/onboarding.html';
    } else {
      errEl.style.color = 'var(--terra)';
      errEl.textContent = 'Revisa tu correo para confirmar tu cuenta.';
      btn.disabled = false; btn.textContent = 'Crear cuenta →';
    }
  }
}

async function doReset() {
  const email = document.getElementById('reset-email').value.trim();
  const errEl = document.getElementById('reset-err');
  const btn = document.getElementById('btn-reset');
  errEl.textContent = '';
  errEl.style.color = '#8B2A1A';
  if (!email) { errEl.textContent = 'Por favor ingresa tu correo.'; return; }
  btn.disabled = true; btn.textContent = 'Enviando…';
  const { error } = await HKSK.db.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://he-sheknows.com/reset-password.html'
  });
  if (error) {
    errEl.textContent = 'Error al enviar. Verifica el correo.';
    btn.disabled = false; btn.textContent = 'Enviar enlace →';
  } else {
    errEl.style.color = 'var(--terra)';
    errEl.textContent = '✓ Revisa tu correo — te enviamos el enlace.';
    btn.textContent = 'Enviado ✓';
  }
}
</script>
</body>
</html>
