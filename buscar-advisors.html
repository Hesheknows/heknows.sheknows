<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscar Advisors · He Knows · She Knows</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--cream:#F7F3EE;--blush:#E8C4B0;--terra:#C47A5A;--night:#1A1410;--slate:#3D3530;--muted:#9A8880;--gold:#C9A96E;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--night);min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:rgba(247,243,238,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(196,122,90,0.12);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;color:var(--night);text-decoration:none;}
.nav-logo span{color:var(--terra);font-style:italic;}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-links a{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--slate);text-decoration:none;font-weight:500;transition:color 0.2s;}
.nav-links a:hover,.nav-links a.active{color:var(--terra);}
.nav-email{font-size:0.72rem;color:var(--muted);}
.btn-logout{background:transparent;border:1px solid rgba(196,122,90,0.3);color:var(--terra);padding:8px 16px;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.btn-logout:hover{background:var(--terra);color:white;}
.page{padding:100px 0 80px;max-width:960px;margin:0 auto;padding-left:24px;padding-right:24px;}
.page-hd{margin-bottom:40px;}
.page-tag{font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--terra);font-weight:600;margin-bottom:10px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:300;color:var(--night);line-height:1.1;margin-bottom:8px;}
.page-title em{font-style:italic;color:var(--terra);}
.page-sub{font-size:0.9rem;color:var(--muted);font-weight:300;}

/* FILTROS */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
.filter-btn{padding:8px 16px;border:1px solid rgba(61,53,48,0.15);border-radius:20px;font-size:0.7rem;cursor:pointer;transition:all 0.2s;color:var(--slate);background:white;font-family:'DM Sans',sans-serif;font-weight:500;}
.filter-btn:hover{border-color:var(--terra);color:var(--terra);}
.filter-btn.on{background:var(--terra);border-color:var(--terra);color:white;}

/* GRID DE ADVISORS */
.advisors-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.advisor-card{background:white;border:1px solid rgba(196,122,90,0.1);border-radius:3px;padding:28px 22px;transition:all 0.25s;position:relative;}
.advisor-card:hover{border-color:var(--terra);box-shadow:0 12px 36px rgba(26,20,16,0.08);transform:translateY(-2px);}
.ac-avail{position:absolute;top:14px;right:14px;width:8px;height:8px;border-radius:50%;background:#ccc;}
.ac-avail.yes{background:#6BAA75;}
.ac-av{width:56px;height:56px;border-radius:50%;background:var(--blush);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--terra);margin-bottom:14px;border:1.5px solid rgba(196,122,90,0.15);}
.ac-av img{width:56px;height:56px;border-radius:50%;object-fit:cover;}
.ac-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:var(--night);margin-bottom:4px;}
.ac-spec{font-size:0.66rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--terra);font-weight:600;margin-bottom:10px;}
.ac-bio{font-size:0.78rem;line-height:1.6;color:var(--muted);font-weight:300;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.ac-footer{display:flex;align-items:center;justify-content:space-between;}
.ac-price{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;color:var(--night);}
.ac-price span{font-family:'DM Sans',sans-serif;font-size:0.65rem;color:var(--muted);font-weight:400;}
.ac-btn{background:var(--night);color:var(--cream);padding:8px 16px;font-size:0.64rem;letter-spacing:0.12em;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;font-family:'DM Sans',sans-serif;font-weight:600;transition:background 0.2s;}
.ac-btn:hover{background:var(--terra);}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 24px;}
.empty-icon{font-size:2.5rem;margin-bottom:16px;}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--night);margin-bottom:8px;}
.empty-sub{font-size:0.88rem;color:var(--muted);font-weight:300;}

/* SKELETON */
.skel{background:linear-gradient(90deg,#ede7df 25%,#e4dcd4 50%,#ede7df 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:2px;}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:white;border:1px solid rgba(196,122,90,0.1);border-radius:3px;padding:28px 22px;}
.skel-av{width:56px;height:56px;border-radius:50%;margin-bottom:14px;}
.skel-line{height:12px;margin-bottom:10px;}
.skel-line.w60{width:60%;}
.skel-line.w40{width:40%;}
.skel-line.w80{width:80%;}

.loader{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:200;transition:opacity 0.35s;}
.loader.gone{opacity:0;pointer-events:none;}
.loader-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:0.28em;text-transform:uppercase;animation:pu 1.4s ease-in-out infinite;}
.loader-logo span{color:var(--terra);font-style:italic;}
@keyframes pu{0%,100%{opacity:.35}50%{opacity:1}}
@media(max-width:900px){.advisors-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){nav{padding:15px 20px;}.advisors-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-logo">He Knows · <span>She Knows</span></div></div>

<nav>
  <a href="dashboard.html" class="nav-logo">He Knows · <span>She Knows</span></a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="buscar-advisors.html" class="active">Advisors</a>
    <a href="perfil.html">Mi perfil</a>
    <span class="nav-email" id="nav-email"></span>
    <button class="btn-logout" id="btn-logout">Salir</button>
  </div>
</nav>

<div class="page">

  <div class="page-hd">
    <div class="page-tag">Directorio de Advisors</div>
    <h1 class="page-title">Encuentra tu <em>perspectiva.</em></h1>
    <p class="page-sub">Personas reales verificadas. Elige por especialidad y precio.</p>
  </div>

  <!-- FILTROS -->
  <div class="filters">
    <button class="filter-btn on" onclick="filterBy(this,'')">Todos</button>
    <button class="filter-btn" onclick="filterBy(this,'Relaciones y pareja')">💔 Relaciones</button>
    <button class="filter-btn" onclick="filterBy(this,'Ghosting e infidelidad')">👻 Ghosting</button>
    <button class="filter-btn" onclick="filterBy(this,'Cómo piensa el sexo opuesto')">🧠 Mentalidad</button>
    <button class="filter-btn" onclick="filterBy(this,'Confianza y autoestima')">💪 Confianza</button>
    <button class="filter-btn" onclick="filterBy(this,'Texting y comunicación')">💬 Texting</button>
    <button class="filter-btn" onclick="filterBy(this,'Citas y conquista')">❤️‍🔥 Citas</button>
  </div>

  <!-- GRID -->
  <div class="advisors-grid" id="advisors-grid">
    <!-- Skeletons mientras carga -->
    <div class="skel-card"><div class="skel skel-av"></div><div class="skel skel-line w60"></div><div class="skel skel-line w40"></div><div class="skel skel-line w80"></div><div class="skel skel-line w60"></div></div>
    <div class="skel-card"><div class="skel skel-av"></div><div class="skel skel-line w60"></div><div class="skel skel-line w40"></div><div class="skel skel-line w80"></div><div class="skel skel-line w60"></div></div>
    <div class="skel-card"><div class="skel skel-av"></div><div class="skel skel-line w60"></div><div class="skel skel-line w40"></div><div class="skel skel-line w80"></div><div class="skel skel-line w60"></div></div>
  </div>

</div>

<script src="supabase.js"></script>
<script>
let ALL_ADVISORS = [];
let CURRENT_FILTER = '';

netlifyIdentity.on('init', async user => {
  if (!user) { window.location.href = '/'; return; }
  document.getElementById('nav-email').textContent = user.email;
  document.getElementById('btn-logout').onclick = () => netlifyIdentity.logout();
  netlifyIdentity.on('logout', () => window.location.href = '/');
  document.getElementById('loader').classList.add('gone');
  await loadAdvisors();
});

async function loadAdvisors() {
  ALL_ADVISORS = await HKSK.getAdvisors();
  renderAdvisors(ALL_ADVISORS);
}

function filterBy(btn, specialty) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  CURRENT_FILTER = specialty;
  const filtered = specialty ? ALL_ADVISORS.filter(a => a.advisor_profiles?.specialty === specialty) : ALL_ADVISORS;
  renderAdvisors(filtered);
}

function renderAdvisors(list) {
  const grid = document.getElementById('advisors-grid');

  if (!list || list.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Aún no hay advisors disponibles</div>
      <p class="empty-sub">Sé el primero en registrarte como Advisor y empieza a ayudar.</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(a => {
    const adv = a.advisor_profiles || {};
    const name = a.full_name || 'Advisor';
    const initial = name[0]?.toUpperCase() || 'A';
    const available = adv.available !== false;
    const price = adv.price_per_session ? `$${adv.price_per_session}` : 'Gratis';
    const avatarHtml = a.avatar_url
      ? `<img src="${a.avatar_url}" alt="${name}">`
      : initial;

    return `<div class="advisor-card">
      <div class="ac-avail ${available ? 'yes' : ''}" title="${available ? 'Disponible' : 'No disponible'}"></div>
      <div class="ac-av">${avatarHtml}</div>
      <div class="ac-name">${name}</div>
      <div class="ac-spec">${adv.specialty || 'Advisor'}</div>
      <div class="ac-bio">${a.bio || 'Advisor verificado en He Knows She Knows.'}</div>
      <div class="ac-footer">
        <div class="ac-price">${price} <span>MXN / consulta</span></div>
        ${available
          ? `<button class="ac-btn" onclick="contactAdvisor('${a.id}')">Consultar →</button>`
          : `<span style="font-size:0.66rem;color:var(--muted);font-style:italic;">No disponible</span>`
        }
      </div>
    </div>`;
  }).join('');
}

function contactAdvisor(id) {
  // Por ahora abre el modal de usuarios para pedir consejo
  // Aquí en el futuro conectarás con el sistema de mensajería
  alert('¡Función de contacto próximamente! Por ahora usa el formulario en la página principal.');
}
</script>
</body>
</html>
